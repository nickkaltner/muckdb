name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create the GitHub Release (once)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi

  build:
    needs: create-release
    name: Build ${{ matrix.target }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package and upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -C "target/${{ matrix.target }}/release" \
            -czf "muckdb-${VERSION}-${{ matrix.target }}.tar.gz" muckdb
          gh release upload "$GITHUB_REF_NAME" "muckdb-${VERSION}-${{ matrix.target }}.tar.gz" \
            --repo "$GITHUB_REPOSITORY" --clobber

  bump-formula:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout muckdb (for the renderer script)
        uses: actions/checkout@v5
        with:
          path: muckdb
      - name: Checkout tap
        uses: actions/checkout@v5
        with:
          repository: nickkaltner/homebrew-muckdb
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" --pattern '*.tar.gz' --dir dist
      - name: Render formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p tap/Formula
          REPO="${GITHUB_REPOSITORY}" \
            muckdb/scripts/render-formula.sh "$VERSION" dist > tap/Formula/muckdb.rb
          cat tap/Formula/muckdb.rb
      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/muckdb.rb
          git commit -m "muckdb ${GITHUB_REF_NAME#v}" || { echo "no changes"; exit 0; }
          git push
