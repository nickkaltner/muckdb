<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>muckdb — pond survey</title>
<style>
  :root {
    --silt: #0e1a16;
    --silt-2: #0b1512;
    --water: #16302a;
    --water-2: #1c3a32;
    --reed: #7d9a8a;
    --reed-dim: #54695e;
    --mist: #e3ede7;
    --duckbill: #e8a33d;
    --ripple: #3fb8a6;
    --error: #e06a52;
    --line: #24463c;
    --mono: ui-monospace, "Cascadia Code", "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 80% -10%, #14241f 0%, transparent 60%),
      var(--silt);
    color: var(--mist);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- header ---------------------------------------------------------- */
  header {
    position: relative;
    overflow: hidden;
    padding: 26px 28px 22px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--silt-2), transparent);
  }
  /* concentric ripples watermark behind the title */
  header::after {
    content: "";
    position: absolute;
    top: -160px; right: -120px;
    width: 420px; height: 420px;
    border-radius: 50%;
    background:
      radial-gradient(circle, transparent 38%, rgba(63,184,166,.05) 39%, transparent 41%),
      radial-gradient(circle, transparent 52%, rgba(63,184,166,.04) 53%, transparent 55%),
      radial-gradient(circle, transparent 66%, rgba(63,184,166,.03) 67%, transparent 69%);
    pointer-events: none;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }
  .brand h1 {
    margin: 0;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 30px;
    letter-spacing: -0.5px;
  }
  .brand h1 .db { color: var(--duckbill); }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--reed);
  }
  .endpoint {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--reed);
  }
  .endpoint a { color: var(--ripple); text-decoration: none; }
  .endpoint a:hover { text-decoration: underline; }

  /* live status as a pond ripple */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--reed);
  }
  .dot {
    position: relative;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--reed-dim);
    flex: none;
  }
  .status.live .dot { background: var(--ripple); }
  .status.live .dot::before {
    content: "";
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--ripple);
    animation: ripple 2.2s ease-out infinite;
  }
  .status.live { color: var(--mist); }
  @keyframes ripple {
    0%   { transform: scale(.6); opacity: .8; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  /* ---- layout ---------------------------------------------------------- */
  main {
    display: grid;
    grid-template-columns: minmax(320px, 0.8fr) 1.4fr;
    gap: 1px;
    background: var(--line);
    min-height: calc(100vh - 92px);
  }
  section { background: var(--silt); padding: 22px 24px; min-width: 0; }

  .panel-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 16px;
  }
  .panel-head .label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--reed);
  }
  .panel-head .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--reed-dim);
    background: var(--water);
    padding: 1px 8px;
    border-radius: 999px;
  }

  /* ---- history ledger -------------------------------------------------- */
  .ledger { list-style: none; margin: 0; padding: 0; }
  .entry {
    position: relative;
    padding: 11px 12px 11px 16px;
    border-left: 2px solid var(--line);
    margin-bottom: 6px;
    background: linear-gradient(90deg, var(--water-2), transparent 80%);
    border-radius: 0 6px 6px 0;
  }
  .entry.fresh { animation: drop .5s cubic-bezier(.2,.8,.2,1); }
  @keyframes drop {
    0%   { transform: translateY(-6px) scale(.99); opacity: 0; }
    60%  { transform: translateY(1px); }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .entry.ok    { border-left-color: var(--ripple); }
  .entry.run   { border-left-color: var(--duckbill); }
  .entry.fail  { border-left-color: var(--error); }
  .entry .cmd {
    font-family: var(--mono);
    font-size: 13px;
    word-break: break-word;
  }
  .entry .cmd .prog { color: var(--reed); }
  .entry .meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 5px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--reed-dim);
  }
  .entry .meta .db { color: var(--duckbill); }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1px 7px;
    border-radius: 999px;
    border: 1px solid currentColor;
  }
  .badge.ok   { color: var(--ripple); }
  .badge.run  { color: var(--duckbill); }
  .badge.fail { color: var(--error); }

  /* ---- databases ------------------------------------------------------- */
  .dblist { list-style: none; margin: 0; padding: 0; }
  .db-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
    background: var(--silt-2);
  }
  .db-card > .db-head {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    padding: 13px 15px;
    background: none;
    border: 0;
    color: inherit;
    cursor: pointer;
    font: inherit;
  }
  .db-card > .db-head:hover { background: var(--water); }
  .db-card > .db-head .caret {
    font-family: var(--mono);
    color: var(--ripple);
    transition: transform .18s ease;
  }
  .db-card.open > .db-head .caret { transform: rotate(90deg); }
  .db-head .name {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--mist);
  }
  .db-head .dir {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--reed-dim);
  }
  .db-head .missing {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--error);
  }
  .db-body { display: none; padding: 4px 15px 15px; }
  .db-card.open .db-body { display: block; }

  .tables { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 4px; }
  .table-chip {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 11px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--water);
    color: var(--mist);
    cursor: pointer;
  }
  .table-chip .n { color: var(--reed); margin-left: 6px; font-size: 11px; }
  .table-chip:hover { border-color: var(--ripple); }
  .table-chip.active { border-color: var(--duckbill); color: var(--duckbill); }

  .note { font-family: var(--mono); font-size: 12px; color: var(--reed); }
  .note.err { color: var(--error); }

  .preview-wrap {
    margin-top: 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: auto;
    max-height: 460px;
  }
  table.preview { border-collapse: collapse; width: 100%; font-family: var(--mono); font-size: 12px; }
  table.preview th, table.preview td {
    text-align: left;
    padding: 7px 12px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  table.preview thead th {
    position: sticky;
    top: 0;
    background: var(--water-2);
    color: var(--ripple);
    letter-spacing: 0.04em;
  }
  table.preview tbody tr:hover { background: var(--water); }
  table.preview td.null { color: var(--reed-dim); font-style: italic; }
  .preview-foot { font-family: var(--mono); font-size: 11px; color: var(--reed-dim); margin-top: 6px; }

  .empty {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--reed);
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 22px;
    text-align: center;
  }
  .empty code { color: var(--duckbill); }

  @media (max-width: 820px) {
    main { grid-template-columns: 1fr; }
    .endpoint { width: 100%; margin: 6px 0 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .entry.fresh { animation: none; }
    .status.live .dot::before { animation: none; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>muck<span class="db">db</span></h1>
      <span class="eyebrow">pond survey · live history &amp; data</span>
      <span class="endpoint">
        <span class="status" id="status"><span class="dot"></span><span id="status-text">connecting</span></span>
        &nbsp;·&nbsp; <a id="self-link" href="/">this host</a>
      </span>
    </div>
  </header>

  <main>
    <section aria-label="Command history">
      <div class="panel-head">
        <span class="label">Ledger</span>
        <span class="count" id="hist-count">0</span>
      </div>
      <ul class="ledger" id="ledger"></ul>
      <div class="empty" id="ledger-empty">
        No commands logged yet.<br />Run <code>muckdb mydb.db</code> to begin the survey.
      </div>
    </section>

    <section aria-label="Databases">
      <div class="panel-head">
        <span class="label">Databases</span>
        <span class="count" id="db-count">0</span>
      </div>
      <ul class="dblist" id="dblist"></ul>
      <div class="empty" id="db-empty">
        No databases touched yet.<br />A database appears here the moment muckdb opens one.
      </div>
    </section>
  </main>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);

  // Selection + table-list cache survive re-renders.
  const ui = { openDbs: new Set(), selTable: {}, tablesCache: {} };
  let lastIds = new Set();

  // ---- rendering --------------------------------------------------------
  function fmtTime(ms) {
    const d = new Date(ms);
    return d.toLocaleTimeString([], { hour12: false }) +
      "." + String(d.getMilliseconds()).padStart(3, "0").slice(0, 2);
  }
  function basename(p) { const i = p.replace(/\/+$/, "").lastIndexOf("/"); return i < 0 ? p : p.slice(i + 1); }
  function dirname(p)  { const i = p.lastIndexOf("/"); return i <= 0 ? "" : p.slice(0, i + 1); }

  function entryClass(inv) {
    if (inv.running) return "run";
    return inv.exit_code === 0 ? "ok" : "fail";
  }
  function badge(inv) {
    if (inv.running) return '<span class="badge run">running</span>';
    return inv.exit_code === 0
      ? '<span class="badge ok">exit 0</span>'
      : `<span class="badge fail">exit ${inv.exit_code}</span>`;
  }

  function renderLedger(history) {
    const list = $("ledger");
    $("hist-count").textContent = history.length;
    $("ledger-empty").style.display = history.length ? "none" : "block";

    const newIds = new Set(history.map((h) => h.id));
    const rows = history.slice().reverse().map((inv) => {
      const cls = entryClass(inv);
      const fresh = !lastIds.has(inv.id) ? " fresh" : "";
      const args = (inv.args || []).map(esc).join(" ");
      const db = inv.db_path
        ? `<span class="db">${esc(basename(inv.db_path))}</span>` : "";
      return `<li class="entry ${cls}${fresh}">
        <div class="cmd"><span class="prog">muckdb</span> ${args || "<em>(shell)</em>"}</div>
        <div class="meta">
          <span>${fmtTime(inv.ts)}</span>
          ${badge(inv)}
          ${db}
        </div>
      </li>`;
    }).join("");
    list.innerHTML = rows;
    lastIds = newIds;
  }

  function renderDatabases(databases) {
    const list = $("dblist");
    $("db-count").textContent = databases.length;
    $("db-empty").style.display = databases.length ? "none" : "block";

    list.innerHTML = databases.map((db) => {
      const open = ui.openDbs.has(db.path);
      const missing = db.exists ? "" : '<span class="missing">missing</span>';
      return `<li class="db-card ${open ? "open" : ""}" data-db="${esc(db.path)}">
        <button class="db-head" data-db="${esc(db.path)}">
          <span class="caret">›</span>
          <span><span class="name">${esc(basename(db.path))}</span>
            <span class="dir">${esc(dirname(db.path))}</span></span>
          ${missing}
        </button>
        <div class="db-body" data-body="${esc(db.path)}">
          ${open ? '<div class="note">loading tables…</div>' : ""}
        </div>
      </li>`;
    }).join("");

    // Re-hydrate any open databases (tables + active preview).
    ui.openDbs.forEach((path) => {
      if (databases.some((d) => d.path === path)) loadTables(path);
    });
  }

  // ---- data fetching ----------------------------------------------------
  async function loadTables(path) {
    const body = document.querySelector(`[data-body="${cssEsc(path)}"]`);
    if (!body) return;
    try {
      const res = await fetch("/api/tables?db=" + encodeURIComponent(path));
      const data = await res.json();
      if (data.error) { body.innerHTML = `<div class="note err">${esc(data.error)}</div>`; return; }
      const tables = data.tables || [];
      ui.tablesCache[path] = tables;
      if (!tables.length) { body.innerHTML = '<div class="note">no tables in this database yet.</div>'; return; }

      const sel = ui.selTable[path];
      const chips = tables.map((t) => {
        const active = sel === t.name ? " active" : "";
        return `<button class="table-chip${active}" data-db="${esc(path)}" data-table="${esc(t.name)}">
          ${esc(t.name)}<span class="n">${t.column_count} cols</span></button>`;
      }).join("");
      body.innerHTML = `<div class="tables">${chips}</div><div class="preview-slot"></div>`;
      if (sel && tables.some((t) => t.name === sel)) loadPreview(path, sel);
    } catch (e) {
      body.innerHTML = `<div class="note err">${esc(String(e))}</div>`;
    }
  }

  async function loadPreview(path, table) {
    const body = document.querySelector(`[data-body="${cssEsc(path)}"]`);
    if (!body) return;
    const slot = body.querySelector(".preview-slot");
    if (!slot) return;
    slot.innerHTML = '<div class="note">reading rows…</div>';
    try {
      const res = await fetch(`/api/preview?db=${encodeURIComponent(path)}&table=${encodeURIComponent(table)}`);
      const data = await res.json();
      if (data.error) { slot.innerHTML = `<div class="note err">${esc(data.error)}</div>`; return; }
      const cols = data.columns || [];
      const rows = data.rows || [];
      const head = cols.map((c) => `<th>${esc(c)}</th>`).join("");
      const bodyRows = rows.map((r) => "<tr>" + r.map(cell).join("") + "</tr>").join("");
      slot.innerHTML = `<div class="preview-wrap"><table class="preview">
        <thead><tr>${head}</tr></thead><tbody>${bodyRows}</tbody></table></div>
        <div class="preview-foot">showing ${rows.length} row${rows.length === 1 ? "" : "s"} · ${cols.length} columns</div>`;
    } catch (e) {
      slot.innerHTML = `<div class="note err">${esc(String(e))}</div>`;
    }
  }

  function cell(v) {
    if (v === null || v === undefined) return '<td class="null">∅</td>';
    if (typeof v === "object") return `<td>${esc(JSON.stringify(v))}</td>`;
    return `<td>${esc(String(v))}</td>`;
  }

  // ---- events -----------------------------------------------------------
  document.addEventListener("click", (ev) => {
    const head = ev.target.closest(".db-head");
    if (head) {
      const path = head.dataset.db;
      if (ui.openDbs.has(path)) ui.openDbs.delete(path);
      else { ui.openDbs.add(path); }
      head.closest(".db-card").classList.toggle("open");
      if (ui.openDbs.has(path)) loadTables(path);
      return;
    }
    const chip = ev.target.closest(".table-chip");
    if (chip) {
      const { db, table } = chip.dataset;
      ui.selTable[db] = table;
      chip.parentElement.querySelectorAll(".table-chip").forEach((c) => c.classList.remove("active"));
      chip.classList.add("active");
      loadPreview(db, table);
    }
  });

  // ---- websocket --------------------------------------------------------
  function setStatus(live, text) {
    $("status").classList.toggle("live", live);
    $("status-text").textContent = text;
  }
  function apply(state) {
    renderLedger(state.history || []);
    // The WS state carries database paths; /api/databases adds existence flags.
    refreshDbExistence(state.databases || []);
  }
  async function refreshDbExistence(fallbackPaths) {
    try {
      const res = await fetch("/api/databases");
      const data = await res.json();
      if (data.databases) { renderDatabases(data.databases); return; }
    } catch (_) { /* fall through to optimistic view */ }
    renderDatabases(fallbackPaths.map((p) => ({ path: p, exists: true })));
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => setStatus(true, "live");
    ws.onmessage = (ev) => { try { apply(JSON.parse(ev.data)); } catch (_) {} };
    ws.onclose = () => { setStatus(false, "reconnecting"); setTimeout(connect, 1500); };
    ws.onerror = () => ws.close();
  }

  // ---- helpers ----------------------------------------------------------
  function esc(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function cssEsc(s) { return s.replace(/["\\]/g, "\\$&"); }

  $("self-link").textContent = location.host;
  connect();
})();
</script>
</body>
</html>
